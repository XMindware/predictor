services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predictor_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - predictor_network
    depends_on:
      - db

  webserver:
    image: nginx:alpine
    container_name: predictor_webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - predictor_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: predictor_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-predictor}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-predictor}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - predictor_network

networks:
  predictor_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
